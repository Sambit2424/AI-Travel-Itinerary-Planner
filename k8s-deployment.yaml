# We're creating two components here (based on parameter kind)
# 1) Deploying streamlit-app
# 2) Creating a service for above deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-app
  labels:
    app: streamlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      containers: #Docker container details that will be used for deployment
        - name: streamlit-container
          image: streamlit-app:latest
          imagePullPolicy: IfNotPresent # This means that our app will look for image in our environment first, if not found then it'll look online
          ports:
            - containerPort: 8501
          envFrom:
            - secretRef:
                name: llmops-secrets
          # Important: Ensure the following keys are added to 'llmops-secrets':
          # - GROQ_API_KEY
          # - JUDGE_GROQ_API_KEY (Expert Judge)
          # - LOGFIRE_TOKEN (Tracing)
          # - TAVILY_API_KEY
          # - SERPER_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-service
spec:
  type: LoadBalancer
  selector:
    app: streamlit
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501